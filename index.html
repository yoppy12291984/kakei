<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計OS</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-title" content="家計OS">
<meta name="theme-color" content="#2d5aa0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1f2328; --sub:#6b7280; --faint:#9aa1ab;
  --bg:#f7f7f4; --card:#ffffff; --line:#e5e5e0;
  --ai:#2d5aa0; --ai-bg:#eef3fa;
  --seiiki:#8a6d2f; --seiiki-bg:#f7f1e3;
  --ok:#2f7d4f; --ok-bg:#e9f4ec;
  --warn:#b3452e; --warn-bg:#faeee9;
  --radius:10px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif; background:var(--bg); color:var(--ink); font-size:15px; line-height:1.6;}
.num{font-family:'IBM Plex Mono',monospace; font-feature-settings:'tnum';}
header{background:var(--card); border-bottom:1px solid var(--line); padding:14px 20px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;}
header h1{font-size:19px; font-weight:700; letter-spacing:.08em;}
header .ver{font-size:12px; color:var(--faint);}
#syncStatus{margin-left:auto; font-size:12px; color:var(--sub);}
nav{display:flex; gap:2px; background:var(--card); border-bottom:1px solid var(--line); padding:0 12px; overflow-x:auto;}
nav button{border:none; background:none; padding:11px 16px; font-size:14px; font-family:inherit; color:var(--sub); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;}
nav button.active{color:var(--ink); font-weight:700; border-bottom-color:var(--ai);}
main{max-width:960px; margin:0 auto; padding:20px 16px 80px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; margin-bottom:16px;}
.card h2{font-size:15px; font-weight:700; margin-bottom:12px; letter-spacing:.04em;}
.card h2 .hint{font-weight:400; font-size:12px; color:var(--faint); margin-left:8px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media(max-width:700px){.grid2{grid-template-columns:1fr;}}
.bignum{font-size:30px; font-weight:500;}
.bignum small{font-size:14px; color:var(--sub); font-weight:400;}
.label{font-size:12px; color:var(--sub); margin-bottom:2px;}
.bar{height:10px; background:var(--bg); border-radius:5px; overflow:hidden; margin:8px 0 4px;}
.bar>div{height:100%; border-radius:5px; transition:width .4s;}
.barnote{font-size:12px; color:var(--sub); display:flex; justify-content:space-between;}
.pill{display:inline-block; font-size:11px; padding:1px 8px; border-radius:10px; vertical-align:1px;}
.pill.seiiki{background:var(--seiiki-bg); color:var(--seiiki);}
.pill.warn{background:var(--warn-bg); color:var(--warn);}
.pill.ok{background:var(--ok-bg); color:var(--ok);}
.pill.ai{background:var(--ai-bg); color:var(--ai);}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; font-size:12px; color:var(--sub); font-weight:500; padding:6px 8px; border-bottom:1px solid var(--line); white-space:nowrap;}
td{padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:middle;}
td.r,th.r{text-align:right;}
tr:last-child td{border-bottom:none;}
select,input[type=text],input[type=number],input[type=date],input[type=month],textarea{font-family:inherit; font-size:13.5px; padding:6px 8px; border:1px solid var(--line); border-radius:6px; background:var(--card); color:var(--ink); max-width:100%;}
textarea{width:100%; min-height:110px; font-family:'IBM Plex Mono',monospace; font-size:12px;}
button.btn{font-family:inherit; font-size:13.5px; padding:7px 14px; border:1px solid var(--line); border-radius:7px; background:var(--card); color:var(--ink); cursor:pointer;}
button.btn:hover{background:var(--bg);}
button.btn.primary{background:var(--ai); border-color:var(--ai); color:#fff;}
button.btn.small{font-size:12px; padding:3px 9px;}
button.btn.danger{color:var(--warn); border-color:var(--warn);}
.row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.mt{margin-top:12px;} .mb{margin-bottom:12px;}
.muted{color:var(--sub); font-size:13px;}
.chart{display:flex; align-items:flex-end; gap:10px; height:190px; padding-top:24px;}
.chart .col{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:0; position:relative; height:100%;}
.chart .seg{width:70%; max-width:56px;}
.chart .seg.leisure{background:var(--seiiki); border-radius:4px 4px 0 0;}
.chart .seg.base{background:var(--ai);}
.chart .col .cap{font-size:11px; color:var(--sub); margin-top:6px;}
.chart .col .val{font-size:11px; color:var(--sub); position:absolute; top:-20px;}
.chart .col.first .seg.base{border-radius:4px 4px 0 0;}
.legend{display:flex; gap:16px; font-size:12px; color:var(--sub); margin-top:10px;}
.legend span::before{content:''; display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:-1px;}
.legend .l1::before{background:var(--ai);}
.legend .l2::before{background:var(--seiiki);}
.goalline{border-top:1px dashed var(--faint); position:relative;}
.hidden{display:none;}
.catbadge{font-size:11px; background:var(--bg); border-radius:4px; padding:1px 6px; color:var(--sub); white-space:nowrap;}
footer{text-align:center; font-size:11px; color:var(--faint); padding:20px;}
.warntext{color:var(--warn);}
.oktext{color:var(--ok);}
</style>
</head>
<body>

<main>

  'LOVEST':'美容・健康','AF四条河原町':'美容・健康','afeel':'美容・健康',

  'ディズニー':'家族レジャー','一休':'家族レジャー','リッツ':'家族レジャー','びわこ':'家族レジャー','ホテル':'家族レジャー','アワジ':'家族レジャー','HELLO KITTY':'家族レジャー','緑水亭':'家族レジャー',
  'アマゾン JP':'買物','ZOZOTOWN':'買物','モンベル':'買物','ワイズロード':'買物','文具':'買物',

const SEED_HISTORY = [

  {cycle:'2026-03', total:560222, leisure:0},
  {cycle:'2026-04', total:574681, leisure:122000},

  {id:'f1', label:'家賃(シエリア京都四条河原町)', amount:190000, method:'other', category:'住居', cancel:false, active:true, note:''},

  {id:'f6', label:'エニタイムフィットネス', amount:8000, method:'other', category:'ジム', cancel:true, active:true, note:'月1回利用 → チョコザップ(3,278円)検討'},
  {id:'f7', label:'日経新聞', amount:4277, method:'other', category:'投資情報', cancel:true, active:true, note:'ほぼ読んでいない'},
  {id:'f8', label:'U-NEXT', amount:2639, method:'amex', category:'サブスク', cancel:true, active:true, note:'解約候補'},

  {id:'f10', label:'YouTube Premium', amount:2280, method:'amex', category:'サブスク', cancel:false, active:true, note:''},
  {id:'f11', label:'YouTube Member', amount:390, method:'amex', category:'サブスク', cancel:false, active:true, note:''},

  {id:'f13', label:'DAZN', amount:1980, method:'amex', category:'サブスク', cancel:false, active:true, note:'W杯期間'},
  {id:'f14', label:'Audible', amount:1500, method:'amex', category:'サブスク', cancel:false, active:true, note:''},
  {id:'f15', label:'株探プレミアム', amount:2780, method:'amex', category:'投資情報', cancel:false, active:true, note:''},
  {id:'f16', label:'ザイ投資戦略メルマガ', amount:7500, method:'amex', category:'投資情報', cancel:false, active:true, note:''},

  {id:'f18', label:'TradingView', amount:544, method:'amex', category:'投資情報', cancel:false, active:true, note:''},
  {id:'f19', label:'Claude', amount:18286, method:'amex', category:'デジタル・アプリ', cancel:false, active:true, note:'4月以降増額($110)'},
  {id:'f20', label:'AF四条河原町(定期購入)', amount:9220, method:'amex', category:'美容・健康', cancel:false, active:true, note:'毎月13日ごろ'}
];

const DEFAULT_STATE = {
  settings: {
    budgetRecurring: 224000,
    leisureAnnual: 2110000,
    cycleMode: true,
    gasUrl: ''
  },
  transactions: [],
  fixed: SEED_FIXED,
  incomes: [],
  merchantMap: DEFAULT_MERCHANT_MAP,
  history: SEED_HISTORY,
  categories: DEFAULT_CATEGORIES
};

/* ========== 状態管理 ========== */
let state = loadLocal();
function loadLocal(){
  try{
    const raw = localStorage.getItem('kakeiOS');
    if(raw){ const s = JSON.parse(raw); return Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), s); }
  }catch(e){ console.warn('localStorage読込失敗', e); }
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function persist(){
  try{ localStorage.setItem('kakeiOS', JSON.stringify(state)); }catch(e){}
  setSync('未同期の変更あり');
}
function setSync(msg){ document.getElementById('syncStatus').textContent = msg; }

/* ========== ユーティリティ ========== */
function yen(n){ return (n<0?'-':'') + Math.abs(Math.round(n)).toLocaleString() + '円'; }
function uid(){ return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function cycleOf(dateStr){
  if(!state.settings.cycleMode) return dateStr.slice(0,7);
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return dateStr.slice(0,7);
  if(d.getDate() >= 22) d.setMonth(d.getMonth()+1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function currentCycle(){
  const now = new Date();
  const iso = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  return cycleOf(iso);
}
function categorize(merchant){
  for(const key in state.merchantMap){
    if(merchant.toUpperCase().includes(key.toUpperCase())) return state.merchantMap[key];
  }
  return '未分類';
}
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ========== 集計 ========== */
function cycleStats(cycle){
  const tx = state.transactions.filter(t => cycleOf(t.date) === cycle);
  let total=0, leisure=0;
  tx.forEach(t=>{ total+=t.amount; if(isSacred(t.category)) leisure+=t.amount; });
  return {total, leisure, base: total-leisure, count: tx.length};
}
function mergedHistory(){
  const map = {};
  state.history.forEach(h=>{ map[h.cycle] = {cycle:h.cycle, total:h.total, leisure:h.leisure, seed:true}; });
  const cycles = new Set(state.transactions.map(t=>cycleOf(t.date)));
  cycles.forEach(c=>{
    const s = cycleStats(c);
    if(s.count>0){ map[c] = {cycle:c, total:s.total, leisure:s.leisure, seed:false}; }
  });
  return Object.values(map).sort((a,b)=>a.cycle<b.cycle?-1:1);
}
function leisureYearTotal(year){
  return mergedHistory().filter(h=>h.cycle.startsWith(year)).reduce((s,h)=>s+h.leisure,0);
}

/* ========== 描画 ========== */
function switchTab(name){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  ['dash','tx','fixed','income','settings'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==name);
  });
  render(name);
}
document.getElementById('nav').addEventListener('click', e=>{
  if(e.target.dataset.tab) switchTab(e.target.dataset.tab);
});

function render(tab){
  if(!tab || tab==='dash') renderDash();
  if(!tab || tab==='tx') renderTx();
  if(!tab || tab==='fixed') renderFixed();
  if(!tab || tab==='income') renderIncome();
  if(!tab || tab==='settings') renderSettings();
}

function renderDash(){
  const el = document.getElementById('tab-dash');
  const cyc = currentCycle();
  const st = cycleStats(cyc);
  const budget = state.settings.budgetRecurring;
  const basePct = Math.min(100, budget>0 ? st.base/budget*100 : 0);
  const over = st.base > budget;

  const year = cyc.slice(0,4);
  const ly = leisureYearTotal(year);
  const lb = state.settings.leisureAnnual;
  const lyPct = Math.min(100, lb>0 ? ly/lb*100 : 0);

  const hist = mergedHistory().slice(-8);
  const maxTotal = Math.max(400000, ...hist.map(h=>h.total));

  const monthIncome = state.incomes.filter(i=>i.month===cyc).reduce((s,i)=>s+i.amount,0);
  const fixedOther = state.fixed.filter(f=>f.active && f.method==='other').reduce((s,f)=>s+f.amount,0);
  const fixedAmex = state.fixed.filter(f=>f.active && f.method==='amex').reduce((s,f)=>s+f.amount,0);
  const cancelSave = state.fixed.filter(f=>f.active && f.cancel).reduce((s,f)=>s+f.amount,0);

  let chartCols = hist.map(h=>{
    const bh = Math.round((h.total-h.leisure)/maxTotal*140);
    const lh = Math.round(h.leisure/maxTotal*140);
    const label = parseInt(h.cycle.slice(5,7)) + '月';
    return `<div class="col">
      <span class="val num">${Math.round(h.total/10000)}万</span>
      ${lh>0?`<div class="seg leisure" style="height:${lh}px"></div>`:''}
      <div class="seg base" style="height:${Math.max(bh,2)}px; ${lh===0?'border-radius:4px 4px 0 0;':''}"></div>
      <span class="cap">${label}${h.seed?'':'●'}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
  <div class="grid2">
    <div class="card">
      <h2>今月の経常支出 <span class="hint">${cyc.replace('-','年')}月請求サイクル(22日〜21日)・レジャー除く</span></h2>
      <div class="bignum num ${over?'warntext':''}">${yen(st.base)} <small>/ ${yen(budget)}</small></div>
      <div class="bar"><div style="width:${basePct}%; background:${over?'var(--warn)':'var(--ai)'}"></div></div>
      <div class="barnote"><span>${st.count}件の明細</span><span class="num">${over?'超過 '+yen(st.base-budget):'残り '+yen(budget-st.base)}</span></div>
      ${st.count===0?'<p class="muted mt">まだ明細がありません。「明細」タブからアメックスCSVを取り込んでください。</p>':''}
    </div>
    <div class="card">
      <h2>家族レジャー年間枠 <span class="pill seiiki">聖域</span> <span class="hint">${year}年</span></h2>
      <div class="bignum num">${yen(ly)} <small>/ ${yen(lb)}</small></div>
      <div class="bar"><div style="width:${lyPct}%; background:var(--seiiki)"></div></div>
      <div class="barnote"><span>消化率 ${Math.round(lyPct)}%</span><span class="num">残り ${yen(Math.max(0,lb-ly))}</span></div>
      <p class="muted mt">回数・費用は維持する方針。削減対象外。</p>
    </div>
  </div>
  <div class="card">
    <h2>月次推移 <span class="hint">アメックス請求額の内訳(●=明細から集計、無印=初期データ)</span></h2>
    <div class="chart">${chartCols}</div>
    <div class="legend"><span class="l1">経常支出</span><span class="l2">家族レジャー(聖域)</span></div>
  </div>
  <div class="grid2">
    <div class="card">
      <h2>今月の収支メモ</h2>
      <table>
        <tr><td>収入(登録分)</td><td class="r num">${yen(monthIncome)}</td></tr>
        <tr><td>アメックス外の固定費</td><td class="r num">${yen(fixedOther)}</td></tr>
        <tr><td>アメックス内の固定費(参考)</td><td class="r num">${yen(fixedAmex)}</td></tr>
        <tr><td>アメックス今月実績</td><td class="r num">${yen(st.total)}</td></tr>
      </table>
    </div>
    <div class="card">
      <h2>解約候補による削減見込み</h2>
      <div class="bignum num oktext">${yen(cancelSave)}<small> /月</small></div>
      <p class="muted">年間換算 <span class="num">${yen(cancelSave*12)}</span></p>
      <p class="muted mt">対象: ${state.fixed.filter(f=>f.active&&f.cancel).map(f=>esc(f.label)).join('、')||'なし'}</p>
    </div>
  </div>`;
}

/* ---------- 明細 ---------- */
let txMonth = '';
function renderTx(){

function importCsvText(text){
  if(!text || !text.trim()){ document.getElementById('importMsg').textContent = 'テキストが空です。'; return; }
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  let added=0, skipped=0;
  const existing = new Set(state.transactions.map(t=>t.date+'|'+t.merchant+'|'+t.amount));
  for(const line of lines){
    if(/ご利用日|日付.*金額/.test(line)) continue;
    const cols = splitCsvLine(line);
    if(cols.length < 3) { skipped++; continue; }
    let dateStr = normDate(cols[0]);
    if(!dateStr){ skipped++; continue; }
    let amount = null, amountIdx = -1;
    for(let i=cols.length-1;i>=1;i--){
      const v = parseInt(cols[i].replace(/[¥,円\s"]/g,''));
      if(!isNaN(v) && v!==0){ amount=v; amountIdx=i; break; }
    }
    if(amount===null || amount<0){ skipped++; continue; }
    const merchant = cols.slice(1,amountIdx).join(' ').replace(/"/g,'').trim() || '不明';
    const key = dateStr+'|'+merchant+'|'+amount;
    if(existing.has(key)){ skipped++; continue; }
    existing.add(key);
    state.transactions.push({id:uid(), date:dateStr, merchant, amount, category:categorize(merchant)});
    added++;
  }
  persist();
  document.getElementById('importMsg').textContent = `${added}件を取り込みました(スキップ ${skipped}件: 重複・支払行・解析不能)。`;
  if(added>0){ txMonth=''; renderTx(); document.getElementById('importMsg').textContent = `${added}件を取り込みました(スキップ ${skipped}件)。`; }
}
function splitCsvLine(line){
  const out=[]; let cur='', inQ=false;
  for(const ch of line){
    if(ch==='"'){ inQ=!inQ; continue; }
    if(ch===',' && !inQ){ out.push(cur); cur=''; } else cur+=ch;
  }
  out.push(cur);
  return out.map(s=>s.trim());
}
function normDate(s){
  s = s.replace(/"/g,'').trim();
  let m = s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  m = s.match(/^(\d{1,2})[\/月](\d{1,2})/);
  if(m){ const y = new Date().getFullYear(); return y+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0'); }
  return null;
}

/* ---------- 固定費 ---------- */
let fxSort = {key:null, dir:1};
function renderFixed(){
  const el = document.getElementById('tab-fixed');
  const act = state.fixed.filter(f=>f.active);
  const totAmex = act.filter(f=>f.method==='amex').reduce((s,f)=>s+f.amount,0);
  const totOther = act.filter(f=>f.method==='other').reduce((s,f)=>s+f.amount,0);
  let list = [...state.fixed];
  if(fxSort.key){
    list.sort((a,b)=>{
      if(a.active !== b.active) return a.active ? -1 : 1;
      let va = a[fxSort.key], vb = b[fxSort.key];
      if(fxSort.key==='cancel'){ va = a.cancel?1:0; vb = b.cancel?1:0; }
      if(typeof va === 'string') return va.localeCompare(vb,'ja') * fxSort.dir;
      return (va - vb) * fxSort.dir;
    });
  }
  const arrow = k => fxSort.key===k ? (fxSort.dir===1?' ▲':' ▼') : '';
  const rows = list.map(f=>`
    <tr data-id="${f.id}" style="${f.active?'':'opacity:.45'}">
      <td>${esc(f.label)}${f.note?`<br><span class="muted" style="font-size:11px">${esc(f.note)}</span>`:''}</td>
      <td><span class="catbadge">${esc(f.category)}</span></td>
      <td><span class="pill ${f.method==='amex'?'ai':'ok'}">${f.method==='amex'?'AMEX':'その他'}</span></td>
      <td class="r num">${yen(f.amount)}</td>
      <td class="r num muted">${yen(f.amount*12)}</td>
      <td style="text-align:center"><input type="checkbox" class="fxcancel" ${f.cancel?'checked':''} title="解約候補"></td>
      <td style="white-space:nowrap"><button class="btn small fxedit">編集</button> <button class="btn small fxtoggle">${f.active?'停止':'再開'}</button> <button class="btn small fxdel">×</button></td>
    </tr>`).join('');
  el.innerHTML = `
  <div class="grid2">
    <div class="card"><div class="label">アメックス払いの固定費(月)</div><div class="bignum num">${yen(totAmex)}</div></div>
    <div class="card"><div class="label">アメックス外の固定費(月)</div><div class="bignum num">${yen(totOther)}</div><p class="muted">家賃・塾代など明細に出ないもの</p></div>
  </div>
  <div class="card">
    <h2>固定費・サブスク一覧 <span class="hint">「解約候補」にチェックするとダッシュボードの削減見込みに反映</span></h2>
    <div style="overflow-x:auto"><table>
      <tr>
        <th class="fxsort" data-key="label" style="cursor:pointer">項目${arrow('label')}</th>
        <th class="fxsort" data-key="category" style="cursor:pointer">分類${arrow('category')}</th>
        <th class="fxsort" data-key="method" style="cursor:pointer">支払${arrow('method')}</th>
        <th class="r fxsort" data-key="amount" style="cursor:pointer">月額${arrow('amount')}</th>
        <th class="r">年換算</th>
        <th class="fxsort" data-key="cancel" style="cursor:pointer">解約候補${arrow('cancel')}</th>
        <th></th>
      </tr>
      ${rows}
    </table></div>
    <div class="row mt">
      <input type="text" id="fxLabel" placeholder="項目名" style="flex:1; min-width:150px">
      <input type="number" id="fxAmount" placeholder="月額" style="width:100px">
      <select id="fxMethod"><option value="amex">AMEX</option><option value="other">その他</option></select>
      <select id="fxCat">${catNames().map(c=>`<option>${c}</option>`).join('')}</select>
      <button class="btn primary" id="fxAdd">追加</button>
    </div>
  </div>`;
  el.querySelectorAll('.fxsort').forEach(th=>{
    th.onclick = ()=>{
      const k = th.dataset.key;
      if(fxSort.key === k){ fxSort.dir *= -1; } else { fxSort = {key:k, dir: k==='amount'||k==='cancel' ? -1 : 1}; }
      renderFixed();
    };
  });
  el.querySelector('#fxAdd').onclick = ()=>{
    const label = el.querySelector('#fxLabel').value.trim();
    const amount = parseInt(el.querySelector('#fxAmount').value)||0;
    if(!label){ alert('項目名を入力してください'); return; }
    state.fixed.push({id:uid(), label, amount, method:el.querySelector('#fxMethod').value, category:el.querySelector('#fxCat').value, cancel:false, active:true, note:''});
    persist(); renderFixed();
  };
  el.querySelectorAll('tr[data-id]').forEach(tr=>{
    const f = state.fixed.find(x=>x.id===tr.dataset.id);
    tr.querySelector('.fxcancel').onchange = e=>{ f.cancel = e.target.checked; persist(); renderFixed(); };
    tr.querySelector('.fxtoggle').onclick = ()=>{ f.active = !f.active; persist(); renderFixed(); };
    tr.querySelector('.fxdel').onclick = ()=>{
      if(confirm(`「${f.label}」を削除します。よろしいですか?\n(一時的に集計から外すだけなら「停止」がおすすめです)`)){
        state.fixed = state.fixed.filter(x=>x.id!==f.id);
        persist(); renderFixed();
      }
    };
    tr.querySelector('.fxedit').onclick = ()=>{
      const label = prompt('項目名', f.label); if(label===null) return;
      const amount = prompt('月額(円)', f.amount); if(amount===null) return;
      const note = prompt('メモ', f.note||''); if(note===null) return;
      f.label = label.trim()||f.label; f.amount = parseInt(amount)||0; f.note = note;
      persist(); renderFixed();
    };
  });
}

    };

      state = JSON.parse(JSON.stringify(DEFAULT_STATE)); persist(); render(); 
    }
  };
}

/* ---------- GAS同期 ---------- */
async function gasSave(){
  const url = state.settings.gasUrl;
  if(!url){ alert('GASのURLを設定してください'); return; }
  setSync('保存中…');
  try{
    const res = await fetch(url, {method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(state)});
    await res.text();
    setSync('保存済み ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){ setSync('保存失敗'); alert('保存に失敗しました: '+e.message); }
}
async function gasLoad(){
  const url = state.settings.gasUrl;
  if(!url){ alert('GASのURLを設定してください'); return; }
  setSync('読込中…');
  try{
    const res = await fetch(url + (url.includes('?')?'&':'?') + 't=' + Date.now());
    const data = await res.json();
    if(data && typeof data === 'object' && data.settings){
      const gasUrl = state.settings.gasUrl;
      state = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), data);
      state.settings.gasUrl = gasUrl;
      persist(); render();
      setSync('読込済み ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}));
    } else { setSync('クラウドにデータなし'); }
  }catch(e){ setSync('読込失敗'); alert('読込に失敗しました: '+e.message); }
}

/* ---------- 起動 ---------- */
render();
setSync('ローカル保存モード');
</script>
