<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計OS</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-title" content="家計OS">
<meta name="theme-color" content="#2d5aa0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1f2328; --sub:#6b7280; --faint:#9aa1ab;
  --bg:#f7f7f4; --card:#ffffff; --line:#e5e5e0;
  --ai:#2d5aa0; --ai-bg:#eef3fa;
  --seiiki:#8a6d2f; --seiiki-bg:#f7f1e3;
  --ok:#2f7d4f; --ok-bg:#e9f4ec;
  --warn:#b3452e; --warn-bg:#faeee9;
  --radius:10px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif; background:var(--bg); color:var(--ink); font-size:15px; line-height:1.6;}
.num{font-family:'IBM Plex Mono',monospace; font-feature-settings:'tnum';}
header{background:var(--card); border-bottom:1px solid var(--line); padding:14px 20px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;}
header h1{font-size:19px; font-weight:700; letter-spacing:.08em;}
header .ver{font-size:12px; color:var(--faint);}
#syncStatus{margin-left:auto; font-size:12px; color:var(--sub);}
nav{display:flex; gap:2px; background:var(--card); border-bottom:1px solid var(--line); padding:0 12px; overflow-x:auto;}
nav button{border:none; background:none; padding:11px 16px; font-size:14px; font-family:inherit; color:var(--sub); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;}
nav button.active{color:var(--ink); font-weight:700; border-bottom-color:var(--ai);}
main{max-width:960px; margin:0 auto; padding:20px 16px 80px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; margin-bottom:16px;}
.card h2{font-size:15px; font-weight:700; margin-bottom:12px; letter-spacing:.04em;}
.card h2 .hint{font-weight:400; font-size:12px; color:var(--faint); margin-left:8px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media(max-width:700px){.grid2{grid-template-columns:1fr;}}
.bignum{font-size:30px; font-weight:500;}
.bignum small{font-size:14px; color:var(--sub); font-weight:400;}
.label{font-size:12px; color:var(--sub); margin-bottom:2px;}
.bar{height:10px; background:var(--bg); border-radius:5px; overflow:hidden; margin:8px 0 4px;}
.bar>div{height:100%; border-radius:5px; transition:width .4s;}
.barnote{font-size:12px; color:var(--sub); display:flex; justify-content:space-between;}
.pill{display:inline-block; font-size:11px; padding:1px 8px; border-radius:10px; vertical-align:1px;}
.pill.seiiki{background:var(--seiiki-bg); color:var(--seiiki);}
.pill.warn{background:var(--warn-bg); color:var(--warn);}
.pill.ok{background:var(--ok-bg); color:var(--ok);}
.pill.ai{background:var(--ai-bg); color:var(--ai);}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; font-size:12px; color:var(--sub); font-weight:500; padding:6px 8px; border-bottom:1px solid var(--line); white-space:nowrap;}
td{padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:middle;}
td.r,th.r{text-align:right;}
tr:last-child td{border-bottom:none;}
select,input[type=text],input[type=number],input[type=date],input[type=month],textarea{font-family:inherit; font-size:13.5px; padding:6px 8px; border:1px solid var(--line); border-radius:6px; background:var(--card); color:var(--ink); max-width:100%;}
textarea{width:100%; min-height:110px; font-family:'IBM Plex Mono',monospace; font-size:12px;}
button.btn{font-family:inherit; font-size:13.5px; padding:7px 14px; border:1px solid var(--line); border-radius:7px; background:var(--card); color:var(--ink); cursor:pointer;}
button.btn:hover{background:var(--bg);}
button.btn.primary{background:var(--ai); border-color:var(--ai); color:#fff;}
button.btn.small{font-size:12px; padding:3px 9px;}
button.btn.danger{color:var(--warn); border-color:var(--warn);}
.row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.mt{margin-top:12px;} .mb{margin-bottom:12px;}
.muted{color:var(--sub); font-size:13px;}
.chart{display:flex; align-items:flex-end; gap:10px; height:190px; padding-top:24px;}
.chart .col{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:0; position:relative; height:100%;}
.chart .seg{width:70%; max-width:56px;}
.chart .seg.leisure{background:var(--seiiki); border-radius:4px 4px 0 0;}
.chart .seg.base{background:var(--ai);}
.chart .col .cap{font-size:11px; color:var(--sub); margin-top:6px;}
.chart .col .val{font-size:11px; color:var(--sub); position:absolute; top:-20px;}
.chart .col.first .seg.base{border-radius:4px 4px 0 0;}
.legend{display:flex; gap:16px; font-size:12px; color:var(--sub); margin-top:10px;}
.legend span::before{content:''; display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:-1px;}
.legend .l1::before{background:var(--ai);}
.legend .l2::before{background:var(--seiiki);}
.goalline{border-top:1px dashed var(--faint); position:relative;}
.hidden{display:none;}
.catbadge{font-size:11px; background:var(--bg); border-radius:4px; padding:1px 6px; color:var(--sub); white-space:nowrap;}
footer{text-align:center; font-size:11px; color:var(--faint); padding:20px;}
.warntext{color:var(--warn);}
.oktext{color:var(--ok);}
</style>
</head>
<body>
<header>
  <h1>家計OS</h1>
  <span class="ver">Ver.2.2 — 除外カテゴリの年間実績</span>
  <span id="syncStatus"></span>
</header>
<nav id="nav">
  <button data-tab="dash" class="active">ダッシュボード</button>
  <button data-tab="tx">明細</button>
  <button data-tab="fixed">固定費・サブスク</button>
  <button data-tab="income">収入</button>
  <button data-tab="todo">Todo</button>
  <button data-tab="settings">設定</button>
</nav>
<main>
  <section id="tab-dash"></section>
  <section id="tab-tx" class="hidden"></section>
  <section id="tab-fixed" class="hidden"></section>
  <section id="tab-income" class="hidden"></section>
  <section id="tab-todo" class="hidden"></section>
  <section id="tab-settings" class="hidden"></section>
</main>
<footer>家計OS — GitHub Pages + Google Apps Script</footer>

<script>
/* ========== 定数・初期データ ========== */
const CATS = ['食費・日用品','外食','コンビニ','交通','光熱費','通信','サブスク','投資情報','医療・学会','美容・健康','ジム','子ども','家族レジャー','買物','デジタル・アプリ','税金・公費','住居','その他','未分類'];
const LEISURE_CAT = '家族レジャー';
const DEFAULT_CATEGORIES = CATS.map(n => ({name:n, sacred: n===LEISURE_CAT}));
function catNames(){ return state.categories.map(c=>c.name); }
function isSacred(name){ const c = state.categories.find(x=>x.name===name); return !!(c && c.sacred); }
function isExcluded(name){ const c = state.categories.find(x=>x.name===name); return !!(c && (c.sacred || c.excluded)); }
function ovr(){ if(!state.budgetOverrides) state.budgetOverrides = {monthly:{}, yearly:{}}; if(!state.budgetOverrides.monthly) state.budgetOverrides.monthly={}; if(!state.budgetOverrides.yearly) state.budgetOverrides.yearly={}; return state.budgetOverrides; }
function budgetFor(cycle){ const o = ovr().monthly[cycle]; return (o !== undefined && o !== null) ? o : state.settings.budgetRecurring; }
function leisureBudgetFor(year){ const o = ovr().yearly[year]; return (o !== undefined && o !== null) ? o : state.settings.leisureAnnual; }
function labelRec(){ return state.settings.labelRecurring || '経常支出'; }
function labelSac(){ return state.settings.labelSacred || '家族レジャー年間枠'; }
function labelEnv(){ return state.settings.labelEnv || 'カテゴリ枠'; }
function catSpendCycle(cat, cycle){ return state.transactions.filter(t=>t.category===cat && cycleOf(t.date)===cycle).reduce((s,t)=>s+t.amount,0); }
function catSpendYear(cat, year){ return state.transactions.filter(t=>t.category===cat && cycleOf(t.date).startsWith(year)).reduce((s,t)=>s+t.amount,0); }

const DEFAULT_MERCHANT_MAP = {

  'ENEOS':'交通','エネオス':'交通','Suica':'交通','スイカ':'交通','阪急':'交通','タクシー':'交通','リパーク':'交通','駐車場':'交通',
  '電気':'光熱費','水道':'光熱費','ガス':'光熱費',
  'オプテージ':'通信','ドコモ':'通信',
  'YOUTUBE':'サブスク','NETFLIX':'サブスク','Netflix':'サブスク','U-NEXT':'サブスク','ユーネクスト':'サブスク','ユ−ネクスト':'サブスク','SPOTIFY':'サブスク','DAZN':'サブスク','フールー':'サブスク','Audible':'サブスク','プライム会費':'サブスク','シーオージェーピー':'サブスク','アマゾンサービシーズ':'サブスク',
  'KABUTAN':'投資情報','TRADINGVIEW':'投資情報','J-QUANTS':'投資情報','ザイ':'投資情報','IRSPEED':'投資情報','東洋経済':'投資情報','日経':'投資情報',
  'CLAUDE':'デジタル・アプリ','ANTHROPIC':'デジタル・アプリ','iTunes':'デジタル・アプリ','DMM':'デジタル・アプリ','GOOGLE':'サブスク','AQUA VOICE':'デジタル・アプリ','WWIQTEST':'デジタル・アプリ','IKIGAI':'デジタル・アプリ',
  '学会':'医療・学会','内科学会':'医療・学会','呼吸器':'医療・学会','がん治療':'医療・学会','メディカル':'医療・学会',
  'LOVEST':'美容・健康','AF四条河原町':'美容・健康','afeel':'美容・健康',
  'チヤナサブ':'ジム','COSPA':'ジム','ウエルネス':'ジム',
  'アカチャンホンポ':'子ども','キッザニア':'子ども',
  'ディズニー':'家族レジャー','一休':'家族レジャー','リッツ':'家族レジャー','びわこ':'家族レジャー','ホテル':'家族レジャー','アワジ':'家族レジャー','HELLO KITTY':'家族レジャー','緑水亭':'家族レジャー',
  'アマゾン JP':'買物','ZOZOTOWN':'買物','モンベル':'買物','ワイズロード':'買物','文具':'買物',
  'eLTAX':'税金・公費','地方税':'税金・公費'
};

const SEED_HISTORY = [
  {cycle:'2026-02', total:509232, leisure:230540},
  {cycle:'2026-03', total:560222, leisure:0},
  {cycle:'2026-04', total:574681, leisure:122000},
  {cycle:'2026-05', total:705825, leisure:191903},
  {cycle:'2026-06', total:561365, leisure:337200}
];

const SEED_FIXED = [
  {id:'f1', label:'家賃(シエリア京都四条河原町)', amount:190000, method:'other', category:'住居', cancel:false, active:true, note:''},
  {id:'f2', label:'トランクルーム', amount:28000, method:'other', category:'住居', cancel:false, active:true, note:''},
  {id:'f3', label:'娘の塾代', amount:0, method:'other', category:'子ども', cancel:false, active:true, note:'金額を入力してください'},
  {id:'f4', label:'パーソナルジム(月換算)', amount:35200, method:'amex', category:'ジム', cancel:false, active:true, note:'隔月70,400円をアメックス払い'},

  {id:'f10', label:'YouTube Premium', amount:2280, method:'amex', category:'サブスク', cancel:false, active:true, note:''},
  {id:'f11', label:'YouTube Member', amount:390, method:'amex', category:'サブスク', cancel:false, active:true, note:''},
  {id:'f12', label:'Spotify', amount:1480, method:'amex', category:'サブスク', cancel:false, active:true, note:''},
  {id:'f13', label:'DAZN', amount:1980, method:'amex', category:'サブスク', cancel:false, active:true, note:'W杯期間'},

  {id:'f15', label:'株探プレミアム', amount:2780, method:'amex', category:'投資情報', cancel:false, active:true, note:''},
  {id:'f16', label:'ザイ投資戦略メルマガ', amount:7500, method:'amex', category:'投資情報', cancel:false, active:true, note:''},
  {id:'f17', label:'J-Quants API', amount:1650, method:'amex', category:'投資情報', cancel:false, active:true, note:'Lightプラン'},
  {id:'f18', label:'TradingView', amount:544, method:'amex', category:'投資情報', cancel:false, active:true, note:''},
  {id:'f19', label:'Claude', amount:18286, method:'amex', category:'デジタル・アプリ', cancel:false, active:true, note:'4月以降増額($110)'},
  {id:'f20', label:'AF四条河原町(定期購入)', amount:9220, method:'amex', category:'美容・健康', cancel:false, active:true, note:'毎月13日ごろ'}
];

const DEFAULT_STATE = {
  settings: {
    budgetRecurring: 224000,
    leisureAnnual: 2110000,
    cycleMode: true,
    gasUrl: ''
  },
  transactions: [],
  fixed: SEED_FIXED,
  incomes: [],
  merchantMap: DEFAULT_MERCHANT_MAP,
  history: SEED_HISTORY,
  categories: DEFAULT_CATEGORIES,
  budgetOverrides: { monthly: {}, yearly: {} },
  todos: [],
  plans: []
};

/* ========== 状態管理 ========== */
let state = loadLocal();
function loadLocal(){
  try{
    const raw = localStorage.getItem('kakeiOS');
    if(raw){ const s = JSON.parse(raw); return Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), s); }
  }catch(e){ console.warn('localStorage読込失敗', e); }
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function persist(){
  try{ localStorage.setItem('kakeiOS', JSON.stringify(state)); }catch(e){}
  setSync('未同期の変更あり');
}
function setSync(msg){ document.getElementById('syncStatus').textContent = msg; }

/* ========== ユーティリティ ========== */
function yen(n){ return (n<0?'-':'') + Math.abs(Math.round(n)).toLocaleString() + '円'; }
function uid(){ return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function cycleOf(dateStr){
  if(!state.settings.cycleMode) return dateStr.slice(0,7);
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return dateStr.slice(0,7);
  if(d.getDate() >= 22) d.setMonth(d.getMonth()+1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function currentCycle(){
  const now = new Date();
  const iso = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  return cycleOf(iso);
}
function cleanMerchant(m){
  m = String(m).normalize('NFKC').replace(/\s+/g,' ').trim();
  m = m.replace(/ユ\?ネクスト/g,'ユーネクスト').replace(/U\?NEXT/g,'U-NEXT').replace(/サ\?ビス/g,'サービス');
  m = m.replace(/\?/g,'ー');
  return m || '不明';
}
function categorize(merchant){
  for(const key in state.merchantMap){
    if(merchant.toUpperCase().includes(key.toUpperCase())) return state.merchantMap[key];
  }
  return '未分類';
}
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ========== 集計 ========== */
function cycleStats(cycle){
  const tx = state.transactions.filter(t => cycleOf(t.date) === cycle);
  let total=0, leisure=0, excl=0;
  tx.forEach(t=>{
    total+=t.amount;
    if(isSacred(t.category)) leisure+=t.amount;
    else if(isExcluded(t.category)) excl+=t.amount;
  });
  return {total, leisure, excl, base: total-leisure-excl, count: tx.length};
}
function mergedHistory(){
  const map = {};
  state.history.forEach(h=>{ map[h.cycle] = {cycle:h.cycle, total:h.total, leisure:h.leisure, seed:true}; });
  const cycles = new Set(state.transactions.map(t=>cycleOf(t.date)));
  cycles.forEach(c=>{
    const s = cycleStats(c);
    if(s.count>0){ map[c] = {cycle:c, total:s.total, leisure:s.leisure, seed:false}; }
  });
  return Object.values(map).sort((a,b)=>a.cycle<b.cycle?-1:1);
}
function leisureYearTotal(year){
  return mergedHistory().filter(h=>h.cycle.startsWith(year)).reduce((s,h)=>s+h.leisure,0);
}

/* ========== 描画 ========== */
function switchTab(name){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  ['dash','tx','fixed','income','todo','settings'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==name);
  });
  render(name);
}
document.getElementById('nav').addEventListener('click', e=>{
  if(e.target.dataset.tab) switchTab(e.target.dataset.tab);
});

function render(tab){
  if(!tab || tab==='dash') renderDash();
  if(!tab || tab==='tx') renderTx();
  if(!tab || tab==='fixed') renderFixed();
  if(!tab || tab==='income') renderIncome();
  if(!tab || tab==='todo') renderTodo();
  if(!tab || tab==='settings') renderSettings();
}

let dashCycle = null;
let dashDetail = null; // {cat, cycle} カテゴリ明細のドリルダウン表示
function defaultDashCycle(){
  const cur = currentCycle();
  if(cycleStats(cur).count > 0) return cur;
  const withData = [...new Set(state.transactions.map(t=>cycleOf(t.date)))].sort();
  return withData.length ? withData[withData.length-1] : cur;
}
function daysLeftInCycle(cyc){
  if(cyc !== currentCycle()) return null;
  const [y, m] = cyc.split('-').map(Number);
  const end = new Date(y, m-1, 21, 23, 59, 59);
  const diff = Math.ceil((end - new Date()) / 86400000);
  return diff >= 0 ? diff : null;
}
function daysLeftInYear(year){
  const now = new Date();
  if(String(now.getFullYear()) !== String(year)) return null;
  return Math.ceil((new Date(Number(year), 11, 31, 23, 59, 59) - now) / 86400000);
}
function shiftCycle(cyc, delta){
  const [y, m] = cyc.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function renderDash(){
  const el = document.getElementById('tab-dash');
  const cyc = dashCycle || defaultDashCycle();
  const isCurrent = cyc === currentCycle();
  const dlCycle = daysLeftInCycle(cyc);
  if(!state.plans) state.plans = [];
  const planRec = state.plans.filter(p=>!isExcluded(p.category) && cycleOf(p.date)===cyc).reduce((s,p)=>s+p.amount,0);
  const autoNote = (!dashCycle && !isCurrent) ? 'データのある最新月を表示中' : '';
  const st = cycleStats(cyc);
  const budget = budgetFor(cyc);
  const budgetOverridden = ovr().monthly[cyc] !== undefined;
  const basePct = Math.min(100, budget>0 ? st.base/budget*100 : 0);
  const over = st.base > budget;

  const year = cyc.slice(0,4);
  const ly = leisureYearTotal(year);
  const dlYear = daysLeftInYear(year);
  const planSac = state.plans.filter(p=>isSacred(p.category) && cycleOf(p.date).startsWith(year)).reduce((s,p)=>s+p.amount,0);
  const lb = leisureBudgetFor(year);
  const lbOverridden = ovr().yearly[year] !== undefined;
  const lyPct = Math.min(100, lb>0 ? ly/lb*100 : 0);

  const envCats = state.categories.filter(c=>c.budget && c.budget.amount>0);
  const envBars = envCats.map(c=>{
    const isYear = c.budget.period==='year';
    const spent = isYear ? catSpendYear(c.name, year) : catSpendCycle(c.name, cyc);
    const plan = (state.plans||[]).filter(p=>p.category===c.name && (isYear ? cycleOf(p.date).startsWith(year) : cycleOf(p.date)===cyc)).reduce((s,p)=>s+p.amount,0);
    const amt = c.budget.amount;
    const pct = Math.min(100, amt>0 ? spent/amt*100 : 0);
    const planPct = Math.min(100-pct, amt>0 ? plan/amt*100 : 0);
    const over = spent > amt;
    return `<div class="mb">
      <div class="barnote"><span>${esc(c.name)}${isSacred(c.name)?' <span class="pill seiiki">聖域</span>':''} <span class="muted">(${isYear?year+'年':'今月'}${(isYear?dlYear:dlCycle)!==null?'・残り'+(isYear?dlYear:dlCycle)+'日':''})</span></span>
      <span class="num ${over?'warntext':''}">${yen(spent)} / ${yen(amt)}</span></div>
      <div class="bar" style="display:flex">
        <div style="width:${pct}%; background:${over?'var(--warn)':(isSacred(c.name)?'var(--seiiki)':'var(--ok)')}"></div>
        ${plan>0?`<div style="width:${planPct}%; background:${isSacred(c.name)?'var(--seiiki)':'var(--ok)'}; opacity:.35"></div>`:''}
      </div>
      ${plan>0?`<div class="barnote"><span class="muted">予定 ${yen(plan)}</span><span class="num">実質残り ${yen(amt-spent-plan)}</span></div>`:''}
    </div>`;
  }).join('');

  // 経常除外カテゴリの年間実績
  const exclCatList = state.categories.filter(c=>c.excluded && !c.sacred).map(c=>{
    const tx = state.transactions.filter(t=>t.category===c.name && cycleOf(t.date).startsWith(year));
    return { name: c.name, total: tx.reduce((s,t)=>s+t.amount,0), count: tx.length };
  });

  // 経常支出の年間集計
  let annualBudget = 0;
  for(let m=1; m<=12; m++) annualBudget += budgetFor(year + '-' + String(m).padStart(2,'0'));
  const exclYear = state.transactions.filter(t=>cycleOf(t.date).startsWith(year) && isExcluded(t.category) && !isSacred(t.category)).reduce((s,t)=>s+t.amount,0);
  const annualBase = mergedHistory().filter(h=>h.cycle.startsWith(year)).reduce((s,h)=>s+(h.total-h.leisure),0) - exclYear;

  const catTotals = {};
  state.transactions.filter(t=>cycleOf(t.date)===cyc).forEach(t=>{ catTotals[t.category]=(catTotals[t.category]||0)+t.amount; });
  const prevCyc = shiftCycle(cyc, -1);
  const prevTotals = {};
  state.transactions.filter(t=>cycleOf(t.date)===prevCyc).forEach(t=>{ prevTotals[t.category]=(prevTotals[t.category]||0)+t.amount; });
  const catEntries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const catMax = catEntries.length ? catEntries[0][1] : 1;
  const hasPrev = Object.keys(prevTotals).length > 0;
  const catRows = catEntries.map(([name, v])=>{
    const diff = v - (prevTotals[name]||0);
    const diffHtml = hasPrev ? `<span class="num ${diff>0?'warntext':(diff<0?'oktext':'')}" style="font-size:12px">${diff>0?'+':''}${diff===0?'±0':diff.toLocaleString()}</span>` : '';
    return `<tr class="drill" data-cat="${esc(name)}" data-cyc="${cyc}" style="cursor:pointer" title="タップで明細を表示">
      <td style="width:32%">${esc(name)}${isSacred(name)?' <span class="pill seiiki">聖域</span>':''}</td>
      <td><div class="bar" style="margin:0"><div style="width:${Math.round(v/catMax*100)}%; background:${isSacred(name)?'var(--seiiki)':'var(--ai)'}"></div></div></td>
      <td class="r num" style="white-space:nowrap">${yen(v)}</td>
      <td class="r" style="white-space:nowrap">${diffHtml}</td>
    </tr>`;
  }).join('');

  // カテゴリ×月の推移マトリクス(直近6サイクル)
  const matCycles = [...new Set(state.transactions.map(t=>cycleOf(t.date)))].sort().slice(-6);
  const matData = {};
  state.transactions.forEach(t=>{
    const c = cycleOf(t.date);
    if(!matCycles.includes(c)) return;
    if(!matData[t.category]) matData[t.category] = {};
    matData[t.category][c] = (matData[t.category][c]||0) + t.amount;
  });
  const matSum = cat => matCycles.reduce((s,c)=>s+(matData[cat][c]||0),0);
  const matCats = Object.keys(matData).sort((a,b)=>matSum(b)-matSum(a));
  const matColTotals = matCycles.map(c=>matCats.reduce((s,cat)=>s+(matData[cat][c]||0),0));
  const fmtCell = v => v ? (v>=10000 ? (v/10000).toFixed(1)+'万' : v.toLocaleString()) : '<span style="color:var(--faint)">—</span>';
  const matHead = matCycles.map(c=>`<th class="r" style="${c===cyc?'color:var(--ai); font-weight:700;':''}">${parseInt(c.slice(5,7))}月</th>`).join('');
  const matRows = matCats.map(cat=>`<tr>
    <td style="white-space:nowrap">${esc(cat)}${isSacred(cat)?' <span class="pill seiiki">聖</span>':''}</td>
    ${matCycles.map(c=>{ const v=matData[cat][c]||0; return `<td class="r num ${v?'drill':''}" ${v?`data-cat="${esc(cat)}" data-cyc="${c}"`:''} style="${c===cyc?'background:var(--ai-bg);':''}${v?'cursor:pointer;':''}">${fmtCell(v)}</td>`; }).join('')}
  </tr>`).join('');
  const matTotalRow = `<tr style="border-top:2px solid var(--line)"><td><strong>合計</strong></td>${matCycles.map((c,i)=>`<td class="r num" style="${c===cyc?'background:var(--ai-bg);':''}"><strong>${fmtCell(matColTotals[i])}</strong></td>`).join('')}</tr>`;

  let detailCard = '';
  if(dashDetail){
    const isYearDetail = dashDetail.cycle.length === 4;
    const dtx = state.transactions
      .filter(t=>t.category===dashDetail.cat && (isYearDetail ? cycleOf(t.date).startsWith(dashDetail.cycle) : cycleOf(t.date)===dashDetail.cycle))
      .sort((a,b)=>a.date<b.date?-1:1);
    const dsum = dtx.reduce((s,t)=>s+t.amount,0);
    detailCard = `<div class="card" id="detailCard" style="border-color:var(--ai)">
      <h2>${esc(dashDetail.cat)} の明細 <span class="hint">${isYearDetail ? dashDetail.cycle+'年(年間)' : dashDetail.cycle.replace('-','年')+'月請求'}・${dtx.length}件・合計 ${yen(dsum)}</span>
        <button class="btn small" id="detailClose" style="float:right">閉じる</button></h2>
      ${dtx.length?`<table>
        <tr><th>日付</th><th>店名</th><th class="r">金額</th></tr>
        ${dtx.map(t=>`<tr><td class="num" style="white-space:nowrap">${t.date.slice(5).replace('-','/')}</td><td>${esc(t.merchant)}</td><td class="r num">${yen(t.amount)}</td></tr>`).join('')}
      </table>`:'<p class="muted">この月の明細はありません。</p>'}
    </div>`;
  }

  const hist = mergedHistory().slice(-8);
  const maxTotal = Math.max(400000, ...hist.map(h=>h.total));

  const monthIncome = state.incomes.filter(i=>i.month===cyc).reduce((s,i)=>s+i.amount,0);
  const fixedOther = state.fixed.filter(f=>f.active && f.method==='other').reduce((s,f)=>s+f.amount,0);
  const fixedAmex = state.fixed.filter(f=>f.active && f.method==='amex').reduce((s,f)=>s+f.amount,0);
  const cancelSave = state.fixed.filter(f=>f.active && f.cancel).reduce((s,f)=>s+f.amount,0);

  let chartCols = hist.map(h=>{
    const bh = Math.round((h.total-h.leisure)/maxTotal*140);
    const lh = Math.round(h.leisure/maxTotal*140);
    const label = parseInt(h.cycle.slice(5,7)) + '月';
    return `<div class="col">
      <span class="val num">${Math.round(h.total/10000)}万</span>
      ${lh>0?`<div class="seg leisure" style="height:${lh}px"></div>`:''}
      <div class="seg base" style="height:${Math.max(bh,2)}px; ${lh===0?'border-radius:4px 4px 0 0;':''}"></div>
      <span class="cap">${label}${h.seed?'':'●'}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
  <div class="row mb" style="justify-content:center; align-items:center; gap:14px;">
    <button class="btn" id="dashPrev">◀</button>
    <div style="text-align:center">
      <strong style="font-size:16px" class="num">${cyc.replace('-','年')}月請求</strong>${isCurrent?' <span class="pill ai">今月</span>':''}${cyc>currentCycle()?' <span class="pill seiiki">未来(予定のみ)</span>':''}
      ${autoNote?`<div class="muted" style="font-size:11px">${autoNote}</div>`:''}
    </div>
    <button class="btn" id="dashNext">▶</button>
    ${!isCurrent?'<button class="btn small" id="dashToday">今月へ</button>':''}
  </div>
  <div class="grid2">
    <div class="card">
      <h2>${esc(labelRec())} <span class="hint">請求サイクル(前月22日〜21日)・聖域除く${budgetOverridden?'・個別予算':''}</span></h2>
      <div class="bignum num ${over?'warntext':''}">${yen(st.base)} <small>/ ${yen(budget)}</small></div>
      <div class="bar" style="display:flex">
        <div style="width:${basePct}%; background:${over?'var(--warn)':'var(--ai)'}"></div>
        ${planRec>0?`<div style="width:${Math.min(100-basePct, budget>0?planRec/budget*100:0)}%; background:var(--ai); opacity:.35" title="予定支出"></div>`:''}
      </div>
      <div class="barnote"><span>${st.count}件の明細${dlCycle!==null?`・締め日(21日)まで<span class="num">${dlCycle}</span>日`:``}</span><span class="num">${over?'超過 '+yen(st.base-budget):'残り '+yen(budget-st.base)}</span></div>
      ${planRec>0?`<div class="barnote"><span class="muted">予定支出(未確定) <span class="num">${yen(planRec)}</span></span><span class="num ${budget-st.base-planRec<0?'warntext':''}">実質残り ${yen(budget-st.base-planRec)}</span></div>`:''}
      ${st.count===0?'<p class="muted mt">まだ明細がありません。「明細」タブからアメックスCSVを取り込んでください。</p>':''}
    </div>
    <div class="card">
    <h2>${esc(labelRec())}(年間) <span class="hint">${year}年・月予算×12(個別予算を反映)</span></h2>
    <div class="bignum num ${annualBase>annualBudget?'warntext':''}">${yen(annualBase)} <small>/ ${yen(annualBudget)}</small></div>
    <div class="bar"><div style="width:${Math.min(100, annualBudget>0?annualBase/annualBudget*100:0)}%; background:${annualBase>annualBudget?'var(--warn)':'var(--ai)'}"></div></div>
    <div class="barnote"><span>消化率 ${annualBudget>0?Math.round(annualBase/annualBudget*100):0}%${dlYear!==null?`・年末まで<span class="num">${dlYear}</span>日`:``}</span><span class="num">残り ${yen(Math.max(0,annualBudget-annualBase))}</span></div>
    </div>
  </div>
  <div class="card">
      <h2>${esc(labelSac())} <span class="pill seiiki">聖域</span> <span class="hint">${year}年${lbOverridden?'・個別枠':''}</span></h2>
      <div class="bignum num">${yen(ly)} <small>/ ${yen(lb)}</small></div>
      <div class="bar" style="display:flex">
        <div style="width:${lyPct}%; background:var(--seiiki)"></div>
        ${planSac>0?`<div style="width:${Math.min(100-lyPct, lb>0?planSac/lb*100:0)}%; background:var(--seiiki); opacity:.35" title="予定支出"></div>`:''}
      </div>
      <div class="barnote"><span>消化率 ${Math.round(lyPct)}%${dlYear!==null?`・年末まで<span class="num">${dlYear}</span>日`:``}</span><span class="num">残り ${yen(Math.max(0,lb-ly))}</span></div>
      ${planSac>0?`<div class="barnote"><span class="muted">予定支出(未確定) <span class="num">${yen(planSac)}</span></span><span class="num ${lb-ly-planSac<0?'warntext':''}">実質残り ${yen(lb-ly-planSac)}</span></div>`:''}
      <p class="muted mt">回数・費用は維持する方針。削減対象外。</p>
    </div>
  ${exclCatList.length?`<div class="card">
    <h2>経常除外カテゴリ(年間実績) <span class="hint">${year}年・経常にも聖域にも入らない独立の財布。タップで明細</span></h2>
    <div style="overflow-x:auto"><table>
      <tr><th>カテゴリ</th><th class="r">件数</th><th class="r">年間実績</th></tr>
      ${exclCatList.map(c=>`<tr class="drill" data-cat="${esc(c.name)}" data-cyc="${year}" style="cursor:pointer">
        <td>${esc(c.name)}</td>
        <td class="r num muted">${c.count}件</td>
        <td class="r num">${yen(c.total)}</td>
      </tr>`).join('')}
    </table></div>
  </div>`:''}
  ${envCats.length?`<div class="card">
    <h2>${esc(labelEnv())} <span class="hint">カテゴリ別の予算枠(予算設定で作成・編集)</span></h2>
    ${envBars}
  </div>`:''}
  <div class="card">
    <h2>月次推移 <span class="hint">アメックス請求額の内訳(●=明細から集計、無印=初期データ)</span></h2>
    <div class="chart">${chartCols}</div>
    <div class="legend"><span class="l1">経常支出</span><span class="l2">聖域カテゴリ分</span></div>
  </div>
  ${catEntries.length?`<div class="card">
    <h2>カテゴリ別内訳 <span class="hint">${cyc.replace('-','年')}月請求・前月比は${hasPrev?prevCyc.replace('-','年')+'月請求との差':'前月データなし'}</span></h2>
    <div style="overflow-x:auto"><table>
      <tr><th>カテゴリ</th><th></th><th class="r">金額</th><th class="r">前月比</th></tr>
      ${catRows}
    </table></div>
  </div>`:''}
  ${matCats.length?`<div class="card">
    <h2>カテゴリ推移 <span class="hint">直近${matCycles.length}か月・請求月ベース・青列=表示中の月・単位は円(万=1万円)</span></h2>
    <div style="overflow-x:auto"><table style="font-size:12.5px">
      <tr><th>カテゴリ</th>${matHead}</tr>
      ${matRows}
      ${matTotalRow}
    </table></div>
  </div>`:''}
  ${detailCard}
  ${(state.todos||[]).filter(t=>!t.done).length?`<div class="card">
    <h2>やること <span class="hint">直近のタスク(Todoタブで管理)</span></h2>
    ${(state.todos||[]).filter(t=>!t.done).sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due<b.due?-1:1;}).slice(0,3).map(t=>{
      const s = todoStatus(t);
      return `<div class="barnote mb"><span>${s==='overdue'?'<span class=\'pill warn\'>期限切れ</span> ':''}${s==='soon'?'<span class=\'pill seiiki\'>まもなく</span> ':''}${esc(t.text)}</span><span class="num muted">${t.due?t.due.slice(5).replace('-','/')+'まで':''}</span></div>`;
    }).join('')}
  </div>`:''}
  <div class="grid2">
    <div class="card">
      <h2>収支メモ(表示中の月)</h2>
      <table>
        <tr><td>収入(登録分)</td><td class="r num">${yen(monthIncome)}</td></tr>
        <tr><td>アメックス外の固定費</td><td class="r num">${yen(fixedOther)}</td></tr>
        <tr><td>アメックス内の固定費(参考)</td><td class="r num">${yen(fixedAmex)}</td></tr>
        <tr><td>アメックス実績(表示中の月)</td><td class="r num">${yen(st.total)}</td></tr>
      </table>
    </div>
    <div class="card">
      <h2>解約候補による削減見込み</h2>
      <div class="bignum num oktext">${yen(cancelSave)}<small> /月</small></div>
      <p class="muted">年間換算 <span class="num">${yen(cancelSave*12)}</span></p>
      <p class="muted mt">対象: ${state.fixed.filter(f=>f.active&&f.cancel).map(f=>esc(f.label)).join('、')||'なし'}</p>
    </div>
  </div>`;
  el.querySelector('#dashPrev').onclick = ()=>{ dashCycle = shiftCycle(cyc, -1); renderDash(); };
  const nx = el.querySelector('#dashNext');
  if(nx) nx.onclick = ()=>{ dashCycle = shiftCycle(cyc, 1); renderDash(); };
  const td = el.querySelector('#dashToday');
  if(td) td.onclick = ()=>{ dashCycle = currentCycle(); renderDash(); };
  el.querySelectorAll('.drill').forEach(d=>{
    d.onclick = ()=>{
      dashDetail = { cat: d.dataset.cat, cycle: d.dataset.cyc };
      renderDash();
      const card = document.getElementById('detailCard');
      if(card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
    };
  });
  const dc = el.querySelector('#detailClose');
  if(dc) dc.onclick = ()=>{ dashDetail = null; renderDash(); };
}

/* ---------- 明細 ---------- */
let txMonth = '';
function renderTx(){
  const el = document.getElementById('tab-tx');
  const cycles = [...new Set(state.transactions.map(t=>cycleOf(t.date)))].sort().reverse();
  if(!txMonth || (!cycles.includes(txMonth) && cycles.length)) txMonth = cycles[0] || currentCycle();
  const tx = state.transactions.filter(t=>cycleOf(t.date)===txMonth).sort((a,b)=>a.date<b.date?1:-1);
  const st = cycleStats(txMonth);

  const catOpts = c => catNames().map(x=>`<option ${x===c?'selected':''}>${x}</option>`).join('');
  const rows = tx.map(t=>`
    <tr data-id="${t.id}" style="${t.src==='manual'?'background:var(--ok-bg);':''}">
      <td class="num" style="white-space:nowrap">${t.date.slice(5).replace('-','/')}</td>
      <td>${t.src==='manual'?'<span class="pill ok">手動</span> ':''}${esc(t.merchant)}${t.amount>=20000 && !isSacred(t.category)?' <span class="pill warn">特別</span>':''}${isSacred(t.category)?' <span class="pill seiiki">聖域</span>':''}</td>
      <td class="r num">${yen(t.amount)}</td>
      <td><select class="txcat">${catOpts(t.category)}</select></td>
      <td style="white-space:nowrap"><button class="btn small txedit">編集</button> <button class="btn small txlearn" title="この店名とカテゴリを辞書に登録">記憶</button> <button class="btn small txdel">×</button></td>
    </tr>`).join('');

  el.innerHTML = `
  <div class="card">
    <h2>アメックス明細の取り込み</h2>
    <p class="muted mb">アメックス会員サイトからダウンロードしたCSVを選択するか、明細テキストを貼り付けてください。店名から自動でカテゴリ分類されます。</p>
    <div class="row mb">
      <input type="file" id="csvFile" accept=".csv,.txt">
      <button class="btn primary" id="importBtn">貼り付けテキストを取り込む</button>
    </div>
    <textarea id="csvPaste" placeholder="例:&#10;2026/06/16,東京ディズニーリゾート,337200&#10;ご利用日,ご利用店名,ご利用金額 のCSVヘッダー付きでもOK"></textarea>
    <p class="muted mt" id="importMsg"></p>
  </div>
  <div class="card">
    <h2>予定支出(未来枠) <span class="hint">まだ確定していない将来の支出。ダッシュボードに薄い色で反映されます</span></h2>
    <div class="row mb">
      <input type="date" id="plDate">
      <input type="text" id="plText" placeholder="例: 同期との飲み会" style="flex:1; min-width:140px">
      <input type="number" id="plAmount" placeholder="金額(概算)" style="width:110px">
      <select id="plCat">${catNames().map(c=>`<option ${c==='未分類'?'selected':''}>${c}</option>`).join('')}</select>
      <button class="btn primary" id="plAdd">予定を追加</button>
    </div>
    ${(state.plans||[]).length?`<table>
      <tr><th>予定日</th><th>内容</th><th class="r">金額(概算)</th><th>カテゴリ</th><th></th></tr>
      ${state.plans.sort((a,b)=>a.date<b.date?-1:1).map(p=>{
        const past = p.date < new Date().toISOString().slice(0,10);
        return `<tr data-pid="${p.id}" style="${past?'':''}">
          <td class="num" style="white-space:nowrap">${p.date.slice(5).replace('-','/')}${past?' <span class="pill warn">要確認</span>':' <span class="pill ai">予定</span>'}</td>
          <td>${esc(p.text)}</td>
          <td class="r num">${yen(p.amount)}</td>
          <td><select class="plcat">${catNames().map(x=>`<option ${x===p.category?'selected':''}>${x}</option>`).join('')}</select></td>
          <td><button class="btn small pldel">×</button></td>
        </tr>`;
      }).join('')}
    </table>
    <p class="muted mt">実際の支出がCSV/明細で入ったら、対応する予定を×で消してください。予定日を過ぎたものには「要確認」が付きます。</p>`:'<p class="muted">予定はありません。飲み会や旅行など、決まっているお金を先に登録しておくと「実質残り」が見えます。</p>'}
  </div>
  <div class="card">
    <h2>明細一覧
      <select id="txMonthSel" style="margin-left:10px">${(cycles.length?cycles:[txMonth]).map(c=>`<option ${c===txMonth?'selected':''}>${c}</option>`).join('')}</select>
      <span class="hint">合計 <span class="num">${yen(st.total)}</span>(経常 <span class="num">${yen(st.base)}</span> + レジャー <span class="num">${yen(st.leisure)}</span>)</span>
    </h2>
    <div class="row mb">
      <input type="date" id="manDate"><input type="text" id="manMerchant" placeholder="店名・内容" style="flex:1; min-width:140px"><input type="number" id="manAmount" placeholder="金額" style="width:110px">
      <button class="btn" id="manAdd">手動追加</button>
      <button class="btn danger" id="monthDel">この月を一括削除</button>

function importCsvText(text){
  if(!text || !text.trim()){ document.getElementById('importMsg').textContent = 'テキストが空です。'; return; }
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  let added=0, skipped=0;
  let amexCols = null; // アメックス公式CSVの列位置
  const existing = new Set(state.transactions.map(t=>t.date+'|'+t.merchant+'|'+t.amount));
  for(const line of lines){
    // ヘッダー検出
    if(/ご利用日/.test(line) && /ご利用内容/.test(line)){
      const h = splitCsvLine(line);
      amexCols = {
        date: h.findIndex(c=>c.includes('ご利用日')),
        merchant: h.findIndex(c=>c.includes('ご利用内容')),
        amount: h.findIndex(c=>c.includes('金額') && !c.includes('海外'))
      };
      continue;
    }
    if(/日付.*金額/.test(line)) continue;
    const cols = splitCsvLine(line);
    let dateStr, merchant, amount;
    if(amexCols && amexCols.date>=0 && amexCols.amount>=0){
      // アメックス公式CSVモード: 列指定で確実に読む
      dateStr = normDate(cols[amexCols.date]||'');
      if(!dateStr){ skipped++; continue; }
      amount = parseInt((cols[amexCols.amount]||'').replace(/[¥,円\s"]/g,''));
      if(isNaN(amount) || amount<=0){ skipped++; continue; } // 支払・返金は除外
      merchant = cleanMerchant(cols[amexCols.merchant]||'不明');
    } else {
      // 汎用モード(日付,店名,金額 の3列形式など)
      if(cols.length < 3){ skipped++; continue; }
      dateStr = normDate(cols[0]);
      if(!dateStr){ skipped++; continue; }
      amount = null; let amountIdx = -1;
      for(let i=cols.length-1;i>=1;i--){
        const v = parseInt(cols[i].replace(/[¥,円\s"]/g,''));
        if(!isNaN(v) && v!==0){ amount=v; amountIdx=i; break; }
      }
      if(amount===null || amount<0){ skipped++; continue; }
      merchant = cols.slice(1,amountIdx).join(' ').replace(/"/g,'').trim() || '不明';
    }
    // 同日・同店名・同金額はアメックスCSVでは別取引の可能性が高いため連番を付けて取り込む
    let key = dateStr+'|'+merchant+'|'+amount;
    if(existing.has(key)){
      if(amexCols){
        let n = 2;
        while(existing.has(dateStr+'|'+merchant+' ('+n+'件目)|'+amount)) n++;
        merchant = merchant+' ('+n+'件目)';
        key = dateStr+'|'+merchant+'|'+amount;
      } else { skipped++; continue; } // 汎用モードは従来通り重複スキップ(再取り込み対策)
    }
    existing.add(key);
    state.transactions.push({id:uid(), date:dateStr, merchant, amount, category:categorize(merchant), src:'csv'});
    added++;
  }
  persist();
  if(added>0){ txMonth=''; renderTx(); }
  document.getElementById('importMsg').textContent = `${added}件を取り込みました(スキップ ${skipped}件: 支払・返金・重複・解析不能)。`;
}
function splitCsvLine(line){
  const out=[]; let cur='', inQ=false;
  for(const ch of line){
    if(ch==='"'){ inQ=!inQ; continue; }
    if(ch===',' && !inQ){ out.push(cur); cur=''; } else cur+=ch;
  }
  out.push(cur);
  return out.map(s=>s.trim());
}
function normDate(s){
  s = s.replace(/"/g,'').trim();
  let m = s.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  m = s.match(/^(\d{1,2})[\/月](\d{1,2})/);
  if(m){ const y = new Date().getFullYear(); return y+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0'); }
  return null;
}

/* ---------- 固定費 ---------- */
let fxSort = {key:null, dir:1};
function renderFixed(){
  const el = document.getElementById('tab-fixed');
  const act = state.fixed.filter(f=>f.active);
  const totAmex = act.filter(f=>f.method==='amex').reduce((s,f)=>s+f.amount,0);
  const totOther = act.filter(f=>f.method==='other').reduce((s,f)=>s+f.amount,0);
  let list = [...state.fixed];
  if(fxSort.key){
    list.sort((a,b)=>{
      if(a.active !== b.active) return a.active ? -1 : 1;
      let va = a[fxSort.key], vb = b[fxSort.key];
      if(fxSort.key==='cancel'){ va = a.cancel?1:0; vb = b.cancel?1:0; }
      if(typeof va === 'string') return va.localeCompare(vb,'ja') * fxSort.dir;
      return (va - vb) * fxSort.dir;
    });
  }
  const arrow = k => fxSort.key===k ? (fxSort.dir===1?' ▲':' ▼') : '';
  const rows = list.map(f=>`
    <tr data-id="${f.id}" style="${f.active?'':'opacity:.45'}">
      <td>${esc(f.label)}${f.note?`<br><span class="muted" style="font-size:11px">${esc(f.note)}</span>`:''}</td>
      <td><select class="fxcat">${catNames().map(x=>`<option ${x===f.category?'selected':''}>${x}</option>`).join('')}${catNames().includes(f.category)?'':`<option selected>${esc(f.category)}</option>`}</select></td>
      <td><span class="pill ${f.method==='amex'?'ai':'ok'}">${f.method==='amex'?'AMEX':'その他'}</span></td>
      <td class="r num">${yen(f.amount)}</td>
      <td class="r num muted">${yen(f.amount*12)}</td>
      <td style="text-align:center"><input type="checkbox" class="fxcancel" ${f.cancel?'checked':''} title="解約候補"></td>
      <td style="white-space:nowrap"><button class="btn small fxup" ${fxSort.key?'disabled':''} title="${fxSort.key?'見出しソート解除後に使えます':''}">↑</button> <button class="btn small fxdown" ${fxSort.key?'disabled':''}>↓</button> <button class="btn small fxedit">編集</button> <button class="btn small fxtoggle">${f.active?'停止':'再開'}</button> <button class="btn small fxdel">×</button></td>
    </tr>`).join('');
  el.innerHTML = `
  <div class="grid2">
    <div class="card"><div class="label">アメックス払いの固定費(月)</div><div class="bignum num">${yen(totAmex)}</div></div>
    <div class="card"><div class="label">アメックス外の固定費(月)</div><div class="bignum num">${yen(totOther)}</div><p class="muted">家賃・塾代など明細に出ないもの</p></div>
  </div>
  <div class="card">
    <h2>固定費・サブスク一覧 <span class="hint">「解約候補」にチェックするとダッシュボードの削減見込みに反映</span></h2>
    <div style="overflow-x:auto"><table>
      <tr>
        <th class="fxsort" data-key="label" style="cursor:pointer">項目${arrow('label')}</th>
        <th class="fxsort" data-key="category" style="cursor:pointer">分類${arrow('category')}</th>
        <th class="fxsort" data-key="method" style="cursor:pointer">支払${arrow('method')}</th>
        <th class="r fxsort" data-key="amount" style="cursor:pointer">月額${arrow('amount')}</th>
        <th class="r">年換算</th>
        <th class="fxsort" data-key="cancel" style="cursor:pointer">解約候補${arrow('cancel')}</th>
        <th></th>
      </tr>
      ${rows}
    </table></div>
    <div class="row mt">
      <input type="text" id="fxLabel" placeholder="項目名" style="flex:1; min-width:150px">
      <input type="number" id="fxAmount" placeholder="月額" style="width:100px">
      <select id="fxMethod"><option value="amex">AMEX</option><option value="other">その他</option></select>
      <select id="fxCat">${catNames().map(c=>`<option>${c}</option>`).join('')}</select>
      <button class="btn primary" id="fxAdd">追加</button>
    </div>
  </div>`;
  el.querySelectorAll('.fxsort').forEach(th=>{
    th.onclick = ()=>{
      const k = th.dataset.key;
      if(fxSort.key === k){
        if(!fxSort.flipped){ fxSort.dir *= -1; fxSort.flipped = true; }
        else { fxSort = {key:null, dir:1}; }
      } else {
        fxSort = {key:k, dir: k==='amount'||k==='cancel' ? -1 : 1, flipped:false};
      }
      renderFixed();
    };
  });
  el.querySelector('#fxAdd').onclick = ()=>{
    const label = el.querySelector('#fxLabel').value.trim();
    const amount = parseInt(el.querySelector('#fxAmount').value)||0;
    if(!label){ alert('項目名を入力してください'); return; }
    state.fixed.push({id:uid(), label, amount, method:el.querySelector('#fxMethod').value, category:el.querySelector('#fxCat').value, cancel:false, active:true, note:''});
    persist(); renderFixed();
  };
  el.querySelectorAll('tr[data-id]').forEach(tr=>{
    const f = state.fixed.find(x=>x.id===tr.dataset.id);
    const up = tr.querySelector('.fxup');
    if(up) up.onclick = ()=>{
      const i = state.fixed.indexOf(f);
      if(i>0){ [state.fixed[i-1], state.fixed[i]] = [state.fixed[i], state.fixed[i-1]]; persist(); renderFixed(); }
    };
    const dn = tr.querySelector('.fxdown');
    if(dn) dn.onclick = ()=>{
      const i = state.fixed.indexOf(f);
      if(i < state.fixed.length-1){ [state.fixed[i+1], state.fixed[i]] = [state.fixed[i], state.fixed[i+1]]; persist(); renderFixed(); }
    };
    const fc = tr.querySelector('.fxcat');
    if(fc) fc.onchange = e=>{ f.category = e.target.value; persist(); renderFixed(); };
    tr.querySelector('.fxcancel').onchange = e=>{ f.cancel = e.target.checked; persist(); renderFixed(); };
    tr.querySelector('.fxtoggle').onclick = ()=>{ f.active = !f.active; persist(); renderFixed(); };
    tr.querySelector('.fxdel').onclick = ()=>{
      if(confirm(`「${f.label}」を削除します。よろしいですか?\n(一時的に集計から外すだけなら「停止」がおすすめです)`)){
        state.fixed = state.fixed.filter(x=>x.id!==f.id);
        persist(); renderFixed();
      }
    };
    tr.querySelector('.fxedit').onclick = ()=>{
      const label = prompt('項目名', f.label); if(label===null) return;
      const amount = prompt('月額(円)', f.amount); if(amount===null) return;
      const note = prompt('メモ', f.note||''); if(note===null) return;
      f.label = label.trim()||f.label; f.amount = parseInt(amount)||0; f.note = note;
      persist(); renderFixed();
    };
  });
}

/* ---------- Todo ---------- */
function todoStatus(t){
  if(t.done) return 'done';
  if(!t.due) return 'nodue';
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(t.due + 'T00:00:00');
  const diff = Math.round((due - today) / 86400000);
  if(diff < 0) return 'overdue';
  if(diff <= 3) return 'soon';
  return 'ok';
}
function renderTodo(){
  const el = document.getElementById('tab-todo');
  if(!state.todos) state.todos = [];
  const undone = state.todos.filter(t=>!t.done).sort((a,b)=>{
    if(!a.due && !b.due) return 0;
    if(!a.due) return 1;
    if(!b.due) return -1;
    return a.due < b.due ? -1 : 1;
  });
  const done = state.todos.filter(t=>t.done).sort((a,b)=>(b.doneDate||'')<(a.doneDate||'')?-1:1);
  const badge = t => {
    const s = todoStatus(t);
    if(s==='overdue') return '<span class="pill warn">期限切れ</span>';
    if(s==='soon') return '<span class="pill seiiki">まもなく</span>';
    return '';
  };
  const dueLabel = t => t.due ? `<span class="num muted" style="font-size:12px; white-space:nowrap">${t.due.slice(5).replace('-','/')}まで</span>` : '';
  const row = t => `<tr data-id="${t.id}">
    <td style="width:28px"><input type="checkbox" class="tdDone" ${t.done?'checked':''}></td>
    <td style="${t.done?'text-decoration:line-through; color:var(--faint);':''}">${esc(t.text)} ${t.done?'':badge(t)}</td>
    <td class="r">${dueLabel(t)}</td>
    <td style="white-space:nowrap"><button class="btn small tdEdit">編集</button> <button class="btn small tdDel">×</button></td>
  </tr>`;
  el.innerHTML = `
  <div class="card">
    <h2>やることリスト <span class="hint">「いつまでに買う」「手続きする」などお金まわりのタスク管理</span></h2>
    <div class="row mb">
      <input type="text" id="tdText" placeholder="例: 7月中にエニタイム解約の電話" style="flex:1; min-width:180px">
      <input type="date" id="tdDue" title="期限(任意)">
      <button class="btn primary" id="tdAdd">追加</button>
    </div>
    ${undone.length?`<table>${undone.map(row).join('')}</table>`:'<p class="muted">未完了のタスクはありません。</p>'}
  </div>
  ${done.length?`<div class="card">
    <h2>完了済み <span class="hint">${done.length}件</span></h2>
    <table>${done.map(row).join('')}</table>
  </div>`:''}`;
  el.querySelector('#tdAdd').onclick = ()=>{
    const text = el.querySelector('#tdText').value.trim();
    if(!text){ alert('内容を入力してください'); return; }
    const due = el.querySelector('#tdDue').value || null;
    state.todos.push({id:uid(), text, due, done:false});
    persist(); renderTodo();
  };
  el.querySelector('#tdText').onkeydown = e=>{ if(e.key==='Enter') el.querySelector('#tdAdd').click(); };
  el.querySelectorAll('tr[data-id]').forEach(tr=>{
    const t = state.todos.find(x=>x.id===tr.dataset.id);
    tr.querySelector('.tdDone').onchange = e=>{
      t.done = e.target.checked;
      t.doneDate = t.done ? new Date().toISOString().slice(0,10) : null;
      persist(); renderTodo();
    };
    tr.querySelector('.tdDel').onclick = ()=>{
      state.todos = state.todos.filter(x=>x.id!==t.id);
      persist(); renderTodo();
    };
    tr.querySelector('.tdEdit').onclick = ()=>{
      const text = prompt('内容', t.text); if(text===null) return;
      const due = prompt('期限(YYYY-MM-DD形式、空欄で期限なし)', t.due||''); if(due===null) return;
      t.text = text.trim() || t.text;
      t.due = /^\d{4}-\d{2}-\d{2}$/.test(due.trim()) ? due.trim() : null;
      persist(); renderTodo();
    };
  });
}

      <tr><td>経常予算の表示名</td><td class="r"><input type="text" id="setLabelRec" value="${esc(labelRec())}" style="width:180px"></td></tr>
      <tr><td>聖域枠の表示名</td><td class="r"><input type="text" id="setLabelSac" value="${esc(labelSac())}" style="width:180px"></td></tr>
      <tr><td>カテゴリ枠の表示名(旧マイ枠)</td><td class="r"><input type="text" id="setLabelEnv" value="${esc(labelEnv())}" style="width:180px"></td></tr>
      <tr><td>請求サイクル集計(22日〜翌21日を1か月と数える)</td><td class="r"><input type="checkbox" id="setCycle" ${s.cycleMode?'checked':''}></td></tr>
    </table>
    <p class="muted mt">目標の考え方: レジャー年間枠211万円(月平均17.6万円)+経常22.4万円 ≒ アメックス月平均40万円</p>
    <h2 class="mt">月別の個別予算 <span class="hint">指定した月だけ経常予算を上書き(ボーナス月など)</span></h2>
    ${Object.keys(ovr().monthly).length?`<table class="mb">
      <tr><th>月</th><th class="r">経常予算</th><th></th></tr>
      ${Object.keys(ovr().monthly).sort().map(m=>`
      <tr><td class="num">${m}</td><td class="r num">${yen(ovr().monthly[m])}</td>
      <td><button class="btn small ovmDel" data-m="${m}">×</button></td></tr>`).join('')}
    </table>`:'<p class="muted mb">個別設定なし(すべて基本値)</p>'}
    <div class="row mb">
      <input type="month" id="ovmMonth">
      <input type="number" id="ovmAmount" placeholder="予算額" style="width:120px">
      <button class="btn" id="ovmAdd">追加・更新</button>
    </div>
    <h2 class="mt">年別のレジャー枠 <span class="hint">指定した年だけ聖域の年間枠を上書き</span></h2>
    ${Object.keys(ovr().yearly).length?`<table class="mb">
      <tr><th>年</th><th class="r">年間枠</th><th></th></tr>
      ${Object.keys(ovr().yearly).sort().map(y=>`
      <tr><td class="num">${y}年</td><td class="r num">${yen(ovr().yearly[y])}</td>
      <td><button class="btn small ovyDel" data-y="${y}">×</button></td></tr>`).join('')}
    </table>`:'<p class="muted mb">個別設定なし(すべて基本値)</p>'}
    <div class="row">
      <input type="number" id="ovyYear" placeholder="年(例: 2027)" style="width:120px" min="2020" max="2100">
      <input type="number" id="ovyAmount" placeholder="年間枠" style="width:130px">
      <button class="btn" id="ovyAdd">追加・更新</button>
    </div>
    <h2 class="mt">${esc(labelEnv())}(カテゴリ別の枠) <span class="hint">「服は年間100万まで」のような枠をいくつでも。ダッシュボードに進捗バーが出ます</span></h2>
    ${state.categories.some(c=>c.budget&&c.budget.amount>0)?`<table class="mb">
      <tr><th>枠(カテゴリ)</th><th>期間</th><th class="r">金額</th><th></th></tr>
      ${state.categories.map((c,i)=>c.budget&&c.budget.amount>0?`
      <tr data-env="${i}">
        <td>${esc(c.name)}${isSacred(c.name)?' <span class="pill seiiki">聖域</span>':''}</td>
        <td><select class="envP"><option value="month" ${c.budget.period==='month'?'selected':''}>月間</option><option value="year" ${c.budget.period==='year'?'selected':''}>年間</option></select></td>
        <td class="r"><input type="number" class="envA" value="${c.budget.amount}" style="width:110px"></td>
        <td><button class="btn small envDel">×</button></td>
      </tr>`:'').join('')}
    </table>`:'<p class="muted mb">枠はまだありません。下のフォームから作成できます。</p>'}
    <div class="row">
      <select id="envCat">${state.categories.filter(c=>!(c.budget&&c.budget.amount>0)).map(c=>`<option>${esc(c.name)}</option>`).join('')}</select>
      <input type="text" id="envNewCat" placeholder="または新カテゴリ名(例: 服)" style="flex:1; min-width:150px">
      <input type="number" id="envAmount" placeholder="金額" style="width:110px">
      <select id="envPeriod"><option value="month">月間</option><option value="year">年間</option></select>
      <button class="btn primary" id="envAdd">枠を追加</button>
    </div>
    <p class="muted mt">新カテゴリ名を入力した場合はカテゴリも同時に作成されます。明細をそのカテゴリに分類すると枠にカウントされます。</p>
  </div>
  <div class="card">
    <h2>GAS同期 <span class="hint">GitHub Pagesに置いたときにGoogle Sheetsへ保存できます</span></h2>
    <div class="row mb">
      <input type="text" id="setGas" value="${esc(s.gasUrl)}" placeholder="GASウェブアプリのURL(https://script.google.com/macros/s/.../exec)" style="flex:1; min-width:240px">
    </div>
    <div class="row">
      <button class="btn primary" id="gasSave">クラウドに保存</button>
      <button class="btn" id="gasLoad">クラウドから読込</button>
    </div>
    <p class="muted mt">※このプレビュー(Claude内)ではブラウザ保存のみ有効です。GitHub Pagesに配置後、code.gsをデプロイしてURLを設定してください。</p>
  </div>
  <div class="card">
    <h2>カテゴリ管理 <span class="hint">「聖域」にチェックしたカテゴリは年間枠にカウントされ、経常支出から除外されます</span></h2>
    <div style="overflow-x:auto"><table>
      <tr><th>カテゴリ名</th><th style="text-align:center">聖域</th><th style="text-align:center">経常除外</th><th>枠(予算)</th><th></th></tr>
      ${state.categories.map((c,i)=>`
      <tr data-ci="${i}">
        <td>${esc(c.name)}${isSacred(c.name)?' <span class="pill seiiki">聖域</span>':''}</td>
        <td style="text-align:center"><input type="checkbox" class="catSacred" ${c.sacred?'checked':''} ${c.name==='未分類'?'disabled':''}></td>
        <td style="text-align:center"><input type="checkbox" class="catExcl" ${(c.sacred||c.excluded)?'checked':''} ${(c.sacred||c.name==='未分類')?'disabled':''} title="${c.sacred?'聖域は自動的に経常除外です':'経常支出の計算から外す'}"></td>
        <td class="num" style="white-space:nowrap">${c.budget&&c.budget.amount>0?(c.budget.period==='year'?'年 ':'月 ')+yen(c.budget.amount):'<span class="muted">—</span>'} <button class="btn small catBudget">枠</button></td>
        <td style="white-space:nowrap">
          <button class="btn small catUp" ${i===0?'disabled':''}>↑</button>
          <button class="btn small catDown" ${i===state.categories.length-1?'disabled':''}>↓</button>
          <button class="btn small catRename" ${c.name==='未分類'?'disabled':''}>名称変更</button>
          <button class="btn small catDel" ${c.name==='未分類'?'disabled':''}>×</button>
        </td>
      </tr>`).join('')}
    </table></div>
    <div class="row mt">
      <input type="text" id="catNew" placeholder="新しいカテゴリ名(例: プレゼント)" style="flex:1; min-width:180px">
      <label class="muted" style="white-space:nowrap"><input type="checkbox" id="catNewSacred"> 聖域にする</label>
      <button class="btn primary" id="catAdd">追加</button>
    </div>
  </div>
  <div class="card">
    <h2>データ管理</h2>
    <div class="row">
      <button class="btn" id="expBtn">JSONエクスポート</button>
      <button class="btn" id="impBtn">JSONインポート</button>
      <input type="file" id="impFile" accept=".json" class="hidden">
      <button class="btn danger" id="resetBtn">初期化</button>
    </div>
    <p class="muted mt">明細 ${state.transactions.length}件 / 固定費 ${state.fixed.length}件 / 収入 ${state.incomes.length}件 / 辞書 ${Object.keys(state.merchantMap).length}語</p>
  </div>`;
  el.querySelector('#setBudget').onchange = e=>{ s.budgetRecurring = parseInt(e.target.value)||0; persist(); };
  el.querySelector('#setLeisure').onchange = e=>{ s.leisureAnnual = parseInt(e.target.value)||0; persist(); };
  el.querySelector('#setCycle').onchange = e=>{ s.cycleMode = e.target.checked; persist(); };
  el.querySelector('#setLabelRec').onchange = e=>{ s.labelRecurring = e.target.value.trim() || '経常支出'; persist(); renderSettings(); };
  el.querySelector('#setLabelSac').onchange = e=>{ s.labelSacred = e.target.value.trim() || '家族レジャー年間枠'; persist(); renderSettings(); };
  el.querySelector('#setLabelEnv').onchange = e=>{ s.labelEnv = e.target.value.trim() || 'カテゴリ枠'; persist(); renderSettings(); };
  // 月別・年別の個別予算
  el.querySelector('#ovmAdd').onclick = ()=>{
    const m = el.querySelector('#ovmMonth').value;
    const a = parseInt(el.querySelector('#ovmAmount').value);
    if(!m || isNaN(a)){ alert('月と予算額を入力してください'); return; }
    ovr().monthly[m] = a; persist(); renderSettings();
  };
  el.querySelectorAll('.ovmDel').forEach(b=>{
    b.onclick = ()=>{ delete ovr().monthly[b.dataset.m]; persist(); renderSettings(); };
  });
  el.querySelector('#ovyAdd').onclick = ()=>{
    const y = el.querySelector('#ovyYear').value.trim();
    const a = parseInt(el.querySelector('#ovyAmount').value);
    if(!/^\d{4}$/.test(y) || isNaN(a)){ alert('年(4桁)と年間枠を入力してください'); return; }
    ovr().yearly[y] = a; persist(); renderSettings();
  };
  el.querySelectorAll('.ovyDel').forEach(b=>{
    b.onclick = ()=>{ delete ovr().yearly[b.dataset.y]; persist(); renderSettings(); };
  });
  // マイ枠の管理
  el.querySelectorAll('tr[data-env]').forEach(tr=>{
    const c = state.categories[parseInt(tr.dataset.env)];
    tr.querySelector('.envP').onchange = e=>{ c.budget.period = e.target.value; persist(); renderSettings(); };
    tr.querySelector('.envA').onchange = e=>{
      const v = parseInt(e.target.value);
      if(!v || v<=0){ delete c.budget; } else { c.budget.amount = v; }
      persist(); renderSettings();
    };
    tr.querySelector('.envDel').onclick = ()=>{
      if(confirm(`「${c.name}」の枠を解除します(カテゴリ自体は残ります)。よろしいですか?`)){
        delete c.budget; persist(); renderSettings();
      }
    };
  });
  el.querySelector('#envAdd').onclick = ()=>{
    const newName = el.querySelector('#envNewCat').value.trim();
    const amount = parseInt(el.querySelector('#envAmount').value);
    const period = el.querySelector('#envPeriod').value;
    if(!amount || amount<=0){ alert('金額を入力してください'); return; }
    let target;
    if(newName){
      if(catNames().includes(newName)){
        target = state.categories.find(c=>c.name===newName);
      } else {
        target = {name:newName, sacred:false};
        state.categories.push(target);
      }
    } else {
      const sel = el.querySelector('#envCat').value;
      target = state.categories.find(c=>c.name===sel);
    }
    if(!target){ alert('カテゴリを選択するか、新カテゴリ名を入力してください'); return; }
    target.budget = { period, amount };
    persist(); renderSettings();
  };
  el.querySelector('#setGas').onchange = e=>{ s.gasUrl = e.target.value.trim(); persist(); };
  // カテゴリ管理
  el.querySelector('#catAdd').onclick = ()=>{
    const name = el.querySelector('#catNew').value.trim();
    if(!name){ alert('カテゴリ名を入力してください'); return; }
    if(catNames().includes(name)){ alert('同名のカテゴリがすでにあります'); return; }
    state.categories.push({name, sacred: el.querySelector('#catNewSacred').checked});
    persist(); renderSettings();
  };
  el.querySelectorAll('tr[data-ci]').forEach(tr=>{
    const idx = parseInt(tr.dataset.ci);
    const c = state.categories[idx];
    const up = tr.querySelector('.catUp');
    if(up) up.onclick = ()=>{
      if(idx===0) return;
      [state.categories[idx-1], state.categories[idx]] = [state.categories[idx], state.categories[idx-1]];
      persist(); renderSettings();
    };
    const dn = tr.querySelector('.catDown');
    if(dn) dn.onclick = ()=>{
      if(idx===state.categories.length-1) return;
      [state.categories[idx+1], state.categories[idx]] = [state.categories[idx], state.categories[idx+1]];
      persist(); renderSettings();
    };
    const sc = tr.querySelector('.catSacred');
    if(sc) sc.onchange = e=>{ c.sacred = e.target.checked; persist(); renderSettings(); };
    const ex = tr.querySelector('.catExcl');
    if(ex) ex.onchange = e=>{ c.excluded = e.target.checked; persist(); renderSettings(); };
    const bd = tr.querySelector('.catBudget');
    if(bd) bd.onclick = ()=>{
      const cur = c.budget && c.budget.amount ? c.budget.amount : '';
      const a = prompt(`「${c.name}」の枠の金額(円)を入力してください。\n0または空欄で枠を解除します。`, cur);
      if(a===null) return;
      const amount = parseInt(a);
      if(!amount || amount<=0){ delete c.budget; persist(); renderSettings(); return; }
      const isMonth = confirm('この枠の期間を選んでください。\n\nOK = 月間の枠(毎月リセット)\nキャンセル = 年間の枠(1年で管理)');
      c.budget = { period: isMonth?'month':'year', amount };
      persist(); renderSettings();
    };
    const rn = tr.querySelector('.catRename');
    if(rn) rn.onclick = ()=>{
      const name = prompt('新しいカテゴリ名', c.name);
      if(!name || name.trim()===c.name) return;
      const nn = name.trim();
      if(catNames().includes(nn)){ alert('同名のカテゴリがすでにあります'); return; }
      const old = c.name;
      c.name = nn;
      state.transactions.forEach(t=>{ if(t.category===old) t.category=nn; });
      state.fixed.forEach(f=>{ if(f.category===old) f.category=nn; });
      for(const k in state.merchantMap){ if(state.merchantMap[k]===old) state.merchantMap[k]=nn; }
      persist(); renderSettings();
    };
    const dl = tr.querySelector('.catDel');
    if(dl) dl.onclick = ()=>{
      const cnt = state.transactions.filter(t=>t.category===c.name).length;
      if(!confirm(`カテゴリ「${c.name}」を削除します。\n該当する明細${cnt}件は「未分類」に変更されます。よろしいですか?`)) return;
      state.transactions.forEach(t=>{ if(t.category===c.name) t.category='未分類'; });
      state.fixed.forEach(f=>{ if(f.category===c.name) f.category='その他'; });
      for(const k in state.merchantMap){ if(state.merchantMap[k]===c.name) delete state.merchantMap[k]; }
      state.categories = state.categories.filter(x=>x!==c);
      persist(); renderSettings();
    };
  });
  el.querySelector('#gasSave').onclick = gasSave;
  el.querySelector('#gasLoad').onclick = gasLoad;
  el.querySelector('#expBtn').onclick = ()=>{
    const blob = new Blob([JSON.stringify(state,null,1)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'kakei-os-backup.json'; a.click();
  };
  el.querySelector('#impBtn').onclick = ()=>el.querySelector('#impFile').click();
  el.querySelector('#impFile').onchange = e=>{
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev=>{
      try{ state = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), JSON.parse(ev.target.result)); persist(); render(); alert('インポートしました'); }
      catch(err){ alert('JSONの解析に失敗しました'); }
    };
    r.readAsText(f);
  };
  el.querySelector('#resetBtn').onclick = ()=>{
    if(confirm('すべてのデータを初期状態に戻します。よろしいですか?')){
      state = JSON.parse(JSON.stringify(DEFAULT_STATE)); persist(); render(); 
    }
  };
}

/* ---------- GAS同期 ---------- */
async function gasSave(){
  const url = state.settings.gasUrl;
  if(!url){ alert('GASのURLを設定してください'); return; }
  setSync('保存中…');
  try{
    const res = await fetch(url, {method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(state)});
    await res.text();
    setSync('保存済み ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){ setSync('保存失敗'); alert('保存に失敗しました: '+e.message); }
}
async function gasLoad(){
  const url = state.settings.gasUrl;
  if(!url){ alert('GASのURLを設定してください'); return; }
  setSync('読込中…');
  try{
    const res = await fetch(url + (url.includes('?')?'&':'?') + 't=' + Date.now());
    const data = await res.json();
    if(data && typeof data === 'object' && data.settings){
      const gasUrl = state.settings.gasUrl;
      state = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), data);
      state.settings.gasUrl = gasUrl;
      persist(); render();
      setSync('読込済み ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}));
    } else { setSync('クラウドにデータなし'); }
  }catch(e){ setSync('読込失敗'); alert('読込に失敗しました: '+e.message); }
}

/* ---------- 起動 ---------- */
render();
setSync('ローカル保存モード');
</script>
</body>
</html>
